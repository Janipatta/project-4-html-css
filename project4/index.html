<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Plans</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>Netflix Plans</h1>
        <div class="plans">
            <div class="plan">
                <h2>Basic</h2>
                <div class="price">₹149/month</div>
                <ul class="features">
                    <li>✓ 1 Screen</li>
                    <li>✓ 720p Quality</li>
                    <li>✓ Standard Definition</li>
                </ul>
                <button>Choose Plan</button>
            </div>

            <div class="plan">
                <h2>Standard</h2>
                <div class="price">₹199/month</div>
                <ul class="features">
                    <li>✓ 2 Screens</li>
                    <li>✓ 1080p Quality</li>
                    <li>✓ Full HD</li>
                </ul>
                <button>Choose Plan</button>
            </div>

            <div class="plan">
                <h2>Premium</h2>
                <div class="price">₹299/month</div>
                <ul class="features">
                    <li>✓ 4 Screens</li>

                    <li>✓ 4K Quality</li>
                    <li>✓ Ultra HD</li>
                </ul>
                <button>Choose Plan</button>
            </div>
        </div>
    </div>


</body>


</html>
